name: Release Conda

on:
  push:
    branches:
      - conda_cd
  release:
    types: [published]
  workflow_dispatch:

jobs:
  condapublish:
    strategy:
      matrix:
        os: [ubuntu-22.04]
        pyv: ["3.10"]
      max-parallel: 5
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: write
      deployments: write
      statuses: write
      actions: write
      checks: read
    steps:

      
      - name: Publish to Conda
        uses: fcakyon/conda-publish-action@v1.3
        with:
          subdir: '.github/conda'
          anacondatoken: ${{ secrets.ANACONDA_TOKEN }}
