name: Release Conda

on:
  push:
    branches:
      - conda_cd
  release:
    types: [published]
  workflow_dispatch:

jobs:
  condapublish:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: write
      deployments: write
      statuses: write
      actions: write
      checks: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # necesario para git describe

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: latest
          auto-update-conda: true

      - name: Create conda environment
        run: conda env create -f environment.yml

      - name: Install conda-build and anaconda-client in base
        run: conda install -c conda-forge conda-build anaconda-client -y

      - name: Determine version from Git tag
        id: git_version
        run: echo "GIT_DESCRIBE_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      - name: Set dynamic version in meta.yaml
        run: |
          VERSION_NUMBER="${GIT_DESCRIBE_TAG#v}"  # elimina la 'v' inicial
          sed -i "s|^{% set version.*%}|{% set version = \"$VERSION_NUMBER\" %}|" .github/conda/meta.yaml

      - name: Build conda package
        run: |
          echo "Building package with version $VERSION_NUMBER"
          PACKAGE_FILE=$(conda build . --output)
          echo "Package built: $PACKAGE_FILE"

      - name: Upload package to Anaconda.org
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          PACKAGE_FILE=$( conda build .github/conda --output)
          # Usamos conda run para asegurar que el comando anaconda esté disponible
          conda run -n base anaconda upload "$PACKAGE_FILE" --user ctlearn-project --label main --force
