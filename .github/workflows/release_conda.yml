name: Release Conda

on:
  push:
    branches: [conda_cd]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  condapublish:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: write
      deployments: write
      statuses: write
      actions: write
      checks: read

    env:
      CONDA_NO_PLUGINS: true        # 🚫 evita errores por plugins
      CONDA_PKGS_DIRS: ~/conda_pkgs_dir

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para git describe y tags

      # 2️⃣ Instalar Miniforge (mamba rápido, sin plugins)
      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          use-mamba: true
          auto-update-conda: false
          activate-environment: ""
          auto-activate-base: true

      # 3️⃣ Cache de paquetes Conda (reduce drásticamente el tiempo)
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: ~/conda_pkgs_dir
          key: conda-pkgs-${{ runner.os }}-${{ hashFiles('environment.yml') }}

      # 4️⃣ Crear entorno (rápido con mamba)
      - name: Create conda environment
        run: |
          mamba env create -f environment.yml --quiet

      # 5️⃣ Instalar dependencias extra (si las tienes fuera del YAML)
      - name: Install pip dependencies
        run: |
          mamba run -n dl1dh pip install -U pydot --quiet

      # 6️⃣ Instalar herramientas de build
      - name: Install conda-build and anaconda-client
        run: |
          mamba install -y -c conda-forge conda-build anaconda-client

      # 7️⃣ Obtener versión del tag (ejemplo: v0.9.2 → 0.9.2)
      - name: Determine version from Git tag
        id: git_version
        run: |
          echo "GIT_DESCRIBE_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      # 8️⃣ Sustituir la versión en meta.yaml dinámicamente
      - name: Set dynamic version in meta.yaml
        run: |
          VERSION_NUMBER="${GIT_DESCRIBE_TAG#v}"
          echo "Setting version to $VERSION_NUMBER"
          sed -i "s|^{% set version.*%}|{% set version = \"$VERSION_NUMBER\" %}|" .github/conda/meta.yaml
          grep version .github/conda/meta.yaml || true

      # 9️⃣ Build del paquete Conda
      - name: Build conda package
        run: |
          PACKAGE_FILE=$(conda build .github/conda --output)
          echo "Building package: $PACKAGE_FILE"
          conda build .github/conda --quiet

      # 🔟 Subida a Anaconda.org
      - name: Upload package to Anaconda.org
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          PACKAGE_FILE=$(conda build .github/conda --output)
          echo "Uploading package: $PACKAGE_FILE"
          anaconda upload "$PACKAGE_FILE" --user ctlearn-project --label main --force
