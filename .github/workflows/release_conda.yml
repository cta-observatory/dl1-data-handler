jobs:
  publish:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 1. Configurar Miniconda y Conda Build
      - name: Setup Miniconda and Conda Tools
        uses: conda-incubator/setup-miniconda@v3
        with:
          # Usaste comillas, así que las mantendremos si funcionaron:
          python-version: '3.10' 
          channels: conda-forge,defaults 
          auto-install-conda: true
          auto-update-conda: true
          mamba-version: "*"
          # Asegúrate de que esta línea esté eliminada si seguiste mi consejo anterior
          # activate-environment: false 
          
      # 2. INSTALACIÓN DE ANACONDA-CLIENT (¡NUEVO PASO!)
      - name: Install anaconda-client and conda-build
        shell: bash
        # Usamos 'mamba' ya que es más rápido y ya está instalado
        run: |
          mamba install anaconda-client conda-build -y
          
      # 3. Configurar Autenticación para Anaconda.org (Aquí es donde falló antes)
      - name: Configure Anaconda Token
        shell: bash
        run: |
          # Ahora 'anaconda' estará disponible
          anaconda config --set upload_token ${{ secrets.ANACONDA_TOKEN }}
          
      # 4. Construir y Subir el Paquete
      - name: Conda Build and Upload Package
        shell: bash
        run: |
          PACKAGE_PATH=$(conda build recipe --output)
          anaconda upload "$PACKAGE_PATH" --force --user 'ctlearn-project'
