name: Release Conda

on:
  push:
    branches: [conda_cd]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  condapublish:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: write
      deployments: write
      statuses: write
      actions: write
      checks: read
  
  build:
    uses: openalea/action-build-publish-anaconda/.github/conda/meta.yaml
    secrets:
      anaconda_token: ${{ secrets.ANACONDA_TOKEN }}
