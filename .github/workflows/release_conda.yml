name: Release Conda

on:
  push:
    branches: [conda_cd]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  condapublish:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: write
      deployments: write
      statuses: write
      actions: write
      checks: read

    env:
      CONDA_NO_PLUGINS: true     # 🚫 Desactivar plugins globalmente
      CONDA_PKGS_DIRS: ~/conda_pkgs_dir

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Instalar Miniforge (ya incluye mamba, sin plugins)
      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          use-mamba: true
          auto-update-conda: false
          activate-environment: ""
          auto-activate-base: true

      # Cache de paquetes Conda
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: ~/conda_pkgs_dir
          key: conda-pkgs-${{ runner.os }}-${{ hashFiles('environment.yml') }}

      # Crear entorno (mamba directo, sin plugins)
      - name: Create conda environment
        run: |
          mamba env create -f environment.yml --quiet

      # Instalar deps extra
      - name: Install pip dependencies
        run: |
          mamba run -n dl1dh pip install -U pydot --quiet

      # Instalar herramientas de build
      - name: Install conda-build and anaconda-client
        run: |
          mamba install -y -c conda-forge conda-build anaconda-client

      # Obtener versión del tag
      - name: Determine version from Git tag
        id: git_version
        run: |
          echo "GIT_DESCRIBE_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      # Sustituir versión
      - name: Set dynamic version in meta.yaml
        run: |
          VERSION_NUMBER="${GIT_DESCRIBE_TAG#v}"
          sed -i "s|^{% set version.*%}|{% set version = \"$VERSION_NUMBER\" %}|" .github/conda/meta.yaml

      # Build del paquete
      - name: Build conda package
        run: |
          PACKAGE_FILE=$(mamba run -n base conda build .github/conda --output)
          echo "Building: $PACKAGE_FILE"
          mamba run -n base conda build .github/conda --quiet

      # Subida a Anaconda.org
      - name: Upload package to Anaconda.org
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          PACKAGE_FILE=$(mamba run -n base conda build .github/conda --output)
          echo "Uploading $PACKAGE_FILE"
          mamba run -n base anaconda upload "$PACKAGE_FILE" --user ctlearn-project --label main --force
