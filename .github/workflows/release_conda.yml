name: Release Conda

on:
  push:
    branches:
      - conda_cd
  release:
    types: [published]
  workflow_dispatch:

jobs:
  condapublish:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: write
      deployments: write
      statuses: write
      actions: write
      checks: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: latest
          auto-update-conda: true

      - name: Create conda environment
        run: conda env create -f environment.yml

      - name: Install conda-build and anaconda-client in base
        run: conda install -c conda-forge conda-build anaconda-client -y

      - name: Build conda package
        run: |
          PACKAGE_FILE=$(conda build . --output)
          echo "Package built: $PACKAGE_FILE"
        shell: bash

      - name: Upload package to Anaconda.org
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          PACKAGE_FILE=$(conda build . --output)
          anaconda upload "$PACKAGE_FILE" --user ctlearn-project --label main --force
        shell: bash
